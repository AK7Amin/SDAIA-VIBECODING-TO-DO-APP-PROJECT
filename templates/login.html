<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>Secure To-Do — Login</title>
<style>
  body { font-family: system-ui, -apple-system, sans-serif;
         background: linear-gradient(135deg, #eef2ff 0%, #f1f5f9 100%); display: flex;
         align-items: center; justify-content: center; min-height: 100vh; margin: 0; color: #1e293b; }
  .card { background: white; padding: 2.2rem; border-radius: 16px;
          box-shadow: 0 10px 40px rgba(79,70,229,.12); width: 340px; }
  h1 { font-size: 1.4rem; margin: 0 0 1.4rem; display: flex; align-items: center; gap: .5rem; }
  .tabs { display: flex; margin-bottom: 1.2rem; border-bottom: 1px solid #e2e8f0; }
  .tab { flex: 1; text-align: center; padding: .6rem; cursor: pointer; color: #64748b; }
  .tab.active { color: #4f46e5; border-bottom: 2px solid #4f46e5; font-weight: 600; }
  form { display: none; flex-direction: column; gap: .7rem; }
  form.active { display: flex; }
  input { padding: .65rem .8rem; border: 1px solid #e2e8f0; border-radius: 9px; font-size: .95rem; }
  input:focus { outline: none; border-color: #4f46e5; }
  button { padding: .7rem; border: none; border-radius: 9px; background: #4f46e5; color: white;
           font-size: .95rem; font-weight: 600; cursor: pointer; }
  button:hover { background: #4338ca; }
  .msg { min-height: 1.2rem; font-size: .85rem; margin-top: .7rem; }
  .msg.error { color: #dc2626; }
  .msg.ok { color: #16a34a; }
</style>
</head>
<body>
  <div class="card">
    <h1>🔐 Secure To-Do</h1>
    <div class="tabs">
      <div class="tab active" data-tab="login">Login</div>
      <div class="tab" data-tab="register">Register</div>
    </div>

    <form id="login-form" class="active">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Log in</button>
    </form>

    <form id="register-form">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Create account</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>

<script>
const tabs = document.querySelectorAll(".tab");
const forms = { login: document.getElementById("login-form"), register: document.getElementById("register-form") };
const msg = document.getElementById("msg");

function showTab(name) {
  tabs.forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  Object.entries(forms).forEach(([k, f]) => f.classList.toggle("active", k === name));
  msg.textContent = "";
}
tabs.forEach(t => t.addEventListener("click", () => showTab(t.dataset.tab)));

const CSRF_TOKEN = document.querySelector('meta[name="csrf-token"]').content;

async function submitForm(form, url, onSuccess) {
  const body = new URLSearchParams(new FormData(form));
  const resp = await fetch(url, {
    method: "POST",
    body,
    headers: { "X-CSRF-Token": CSRF_TOKEN },
  });
  const data = await resp.json().catch(() => ({}));
  if (resp.ok) {
    onSuccess(data);
  } else {
    msg.textContent = data.error || "Something went wrong.";
    msg.className = "msg error";
  }
}

forms.login.addEventListener("submit", async (e) => {
  e.preventDefault();
  await submitForm(forms.login, "/login", () => { window.location.href = "/dashboard"; });
});

forms.register.addEventListener("submit", async (e) => {
  e.preventDefault();
  await submitForm(forms.register, "/register", () => {
    msg.textContent = "Registered! Please log in.";
    msg.className = "msg ok";
    showTab("login");
    msg.textContent = "Registered! Please log in.";
    msg.className = "msg ok";
  });
});
</script>
</body>
</html>
